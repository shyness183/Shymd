<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="shymd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d8dff"/>
      <stop offset="100%" stop-color="#9ec5ff"/>
    </linearGradient>
    <linearGradient id="shymd-mark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f6ff"/>
    </linearGradient>
  </defs>
  <!-- Soft rounded square -->
  <rect x="2" y="2" width="44" height="44" rx="11" fill="url(#shymd-bg)"/>
  <!-- Faint top highlight for a subtle "lit" feel -->
  <rect x="2" y="2" width="44" height="22" rx="11" fill="#ffffff" fill-opacity="0.08"/>
  <!-- Stylised lowercase 's' — hand-drawn curve, symmetrical dip/rise -->
  <path
    d="M30 17.5
       C30 15.2 27.8 14 24.6 14
       C21 14 18.8 15.6 18.8 18
       C18.8 20.2 20.4 21.2 24 22
       C28.1 22.9 30 24.2 30 26.8
       C30 29.6 27.4 31 24 31
       C20.6 31 18.2 29.6 18 27.2"
    fill="none"
    stroke="url(#shymd-mark)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- Small downward chevron — hints at ".md" / markdown file -->
  <path
    d="M20 34 L24 38 L28 34"
    fill="none"
    stroke="url(#shymd-mark)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
